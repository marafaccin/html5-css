<!DOCTYPE html>
<html>
<head>
<style>
button {
  background-color: green;
  color: white;
  padding: 10px 20px;
  border: none;
  cursor: pointer;   /*maozinha */
  transition: 0.3s; /*animação suave*/
}

button:hover {
  background-color: darkgreen;
  transform: scale(1.1);   /*aumenta o tamanho */
}
</style>
</head>

<body>

<button>Clique aqui</button>

</body>
</html>
