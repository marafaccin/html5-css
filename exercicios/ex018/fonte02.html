<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <Style>
        @font-face {
            font-family:'Love' ;
            src: url('love story ttf.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            /*Tipos de format()
            -opentype (otf)
            -truetype (ttf)
            -embedded-opentype
            -truetype-aat (apple Advanced typography)
            -svg 
            */
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 3em;
        }
        h1 {
            font-family: 'Love', times, serif;
            font-size: 3em;
        }
    </Style>
</head>
<body>
    <h1>Amor</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Quo quasi fugit saepe tempora enim est quia beatae praesentium reiciendis itaque, corrupti blanditiis! Quasi, perspiciatis numquam? Minima hic excepturi dignissimos exercitationem?</p>
    
</body>
</html>
